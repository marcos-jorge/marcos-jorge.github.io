<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Memory - CodeInMind</title>

    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: "Courier New", monospace;
            text-align: center;
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
            text-shadow: 0 0 10px #0f0;
        }

        select {
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 8px 12px;
            font-family: "Courier New", monospace;
            font-size: 18px;
            margin: 10px;
            text-shadow: 0 0 6px #0f0;
        }

        #cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            width: 220px;
            height: 140px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            padding: 10px;
            border: 2px solid #0f0;
        }

        .card-front {
            background: #111;
        }

        .card-back {
            background: #003300;
            transform: rotateY(180deg);
        }

        /* Botón Back estilo AS/400 */
        .menu-item {
            display: block;
            font-size: 1.3em;
            padding: 10px 0;
            color: #00ff00;
            text-decoration: none;
            border: 2px solid #00ff00;
            width: 200px;
            margin: 40px auto 0 auto;
            text-align: center;
            text-shadow: 0 0 6px #00ff00;
        }

        .menu-item:hover {
            background: rgba(0, 40, 0, 0.7);
            cursor: pointer;
        }

        .center-btn {
            text-align: center;
        }
    </style>
</head>

<body>

    <h2>Memory Cards</h2>

    <select id="modoSelector">
        <option value="es-en">ES → EN</option>
        <option value="en-es">EN → ES</option>
    </select>

    <!-- Selector de tema -->
    <select id="temaSelector">
        <option value="basico">Básico</option>
        <option value="preguntas">Preguntas</option>
        <option value="viajes">Viajes</option>
    </select>

    <div id="cards"></div>

    <a href="../projects.html" class="menu-item center-btn">Back</a>

    <script>
        const temas = {
            basico: [
                { es: "Hola", en: "Hello" },
                { es: "Gracias", en: "Thank you" },
                { es: "Por favor", en: "Please" }
            ],

            preguntas: [
                { es: "¿Dónde está el baño?", en: "Where is the bathroom?" },
                { es: "¿Qué hora es?", en: "What time is it?" },
                { es: "¿Cómo te llamas?", en: "What is your name?" }
            ],

            viajes: [
                { es: "Necesito un taxi", en: "I need a taxi" },
                { es: "¿Cuánto cuesta?", en: "How much is it?" },
                { es: "¿Dónde está el hotel?", en: "Where is the hotel?" }
            ]
        };

        const temasNombres = {
            es: {
                basico: "Básico",
                preguntas: "Preguntas",
                viajes: "Viajes"
            },
            en: {
                basico: "Basic",
                preguntas: "Questions",
                viajes: "Travel"
            }
        };

        const cardsContainer = document.getElementById("cards");
        const selectorTema = document.getElementById("temaSelector");
        const selectorModo = document.getElementById("modoSelector");

        function speak(text, lang) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = lang;
            utter.rate = 1;
            utter.pitch = 1;
            speechSynthesis.speak(utter);
        }

        function actualizarNombresTemas() {
            const modo = selectorModo.value;
            const idioma = modo === "es-en" ? "es" : "en";

            selectorTema.options[0].text = temasNombres[idioma].basico;
            selectorTema.options[1].text = temasNombres[idioma].preguntas;
            selectorTema.options[2].text = temasNombres[idioma].viajes;
        }

        function cargarTarjetas() {
            const tema = selectorTema.value;
            const modo = selectorModo.value;

            cardsContainer.innerHTML = "";

            temas[tema].forEach(frase => {
                const card = document.createElement("div");
                card.classList.add("card");

                let frontText = frase.es;
                let backText = frase.en;

                if (modo === "en-es") {
                    frontText = frase.en;
                    backText = frase.es;
                }

                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front">${frontText}</div>
                        <div class="card-face card-back">${backText}</div>
                    </div>
                `;

                card.addEventListener("click", () => {
                    const flipped = card.classList.toggle("flipped");

                    // AUDIO DEL LADO OCULTO (la traducción)
                    if (flipped) {
                        if (modo === "es-en") {
                            speak(backText, "en-US");
                        } else {
                            speak(backText, "es-ES");
                        }
                    }
                });

                cardsContainer.appendChild(card);
            });
        }

        actualizarNombresTemas();
        cargarTarjetas();

        // cambiar tema o idioma
        selectorTema.addEventListener("change", cargarTarjetas);

        selectorModo.addEventListener("change", () => {
            actualizarNombresTemas();
            cargarTarjetas();
        });
    </script>

</body>
</html>
