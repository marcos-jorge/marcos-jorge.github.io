<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - CodeInMind</title>

    <style>
        body {
            font-family: "Courier New", monospace;
            background: #000;
            color: #00ff00;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin: 0;
            text-shadow: 0 0 8px #00ff00;
        }

        /* Caja estilo AS/400 */
        .as400-box {
            border: 3px solid #00ff00;
            padding: 25px 40px;
            width: 380px;
            background: rgba(0, 20, 0, 0.6);
            font-family: "Courier New", monospace;
            color: #00ff00;
            text-shadow: 0 0 6px #00ff00;
            margin-top: 40px;
            opacity: 0;
            animation: fadeIn 1s forwards, crt-flicker 0.25s infinite alternate;
            text-align: left;
        }

        .menu-title {
            font-size: 1.4em;
            margin-bottom: 20px;
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
        }

        .menu-item {
            display: block;
            font-size: 1.3em;
            padding: 6px 0;
            color: #00ff00;
            text-decoration: none;
            opacity: 0;
            animation: fadeIn 1s forwards;
            animation-delay: 0.3s;
        }

        .menu-item:hover {
            background: rgba(0, 40, 0, 0.7);
            cursor: pointer;
        }

        .separator-glow {
        height: 2px;
        background: #00ff00;
        box-shadow: 0 0 8px #00ff00;
        margin: 15px 0;
        }

        @keyframes crt-flicker {
            0% { opacity: 0.8; }
            5% { opacity: 1; }
            10% { opacity: 0.7; }
            15% { opacity: 1; }
            20% { opacity: 0.9; }
            100% { opacity: 1; }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .creditos {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #CCCCCC;
            opacity: 0.8;
            text-shadow: 0 0 10px #CCCCCC;
        }
    </style>
</head>

<body>

    <h1>Project Index</h1>

    <div class="as400-box">
        <a href="#" class="menu-item">> Memory</a>
        <a href="#" class="menu-item">> Shooter</a>
        <div class="separator-glow"></div>
        <a href="../index.html" class="menu-item">> Back</a>
    </div>

    <div class="creditos">© 2026 CodeInMind</div>

</body>
</html>
