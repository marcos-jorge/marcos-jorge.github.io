<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeInMind</title>

    <style>
        body {
            background: #0d0d0d;
            color: #00e0c6;
            font-family: "Inter", monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Efecto scanline */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                rgba(255,255,255,0.03) 0px,
                rgba(255,255,255,0.03) 1px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 4px;
            white-space: nowrap;
            border-right: 3px solid #00e0c6;
            padding-right: 10px;
            animation: blink 0.7s infinite;
            position: relative;
        }

        @keyframes blink {
            0% { border-color: transparent; }
            50% { border-color: #00e0c6; }
            100% { border-color: transparent; }
        }

        /* Efecto glitch */
        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0.6;
            clip-path: inset(0 0 0 0);
        }

        .glitch::before {
            color: #ff00c8;
            animation: glitch1 1.5s infinite;
        }

        .glitch::after {
            color: #00fff2;
            animation: glitch2 1.5s infinite;
        }

        @keyframes glitch1 {
            0% { transform: translate(0,0); clip-path: inset(0 0 0 0); }
            20% { transform: translate(-3px,-2px); clip-path: inset(10% 0 85% 0); }
            40% { transform: translate(3px,2px); clip-path: inset(80% 0 5% 0); }
            60% { transform: translate(-2px,1px); clip-path: inset(30% 0 50% 0); }
            80% { transform: translate(2px,-1px); clip-path: inset(60% 0 20% 0); }
            100% { transform: translate(0,0); clip-path: inset(0 0 0 0); }
        }

        @keyframes glitch2 {
            0% { transform: translate(0,0); clip-path: inset(0 0 0 0); }
            20% { transform: translate(3px,1px); clip-path: inset(80% 0 5% 0); }
            40% { transform: translate(-3px,-1px); clip-path: inset(10% 0 85% 0); }
            60% { transform: translate(2px,-2px); clip-path: inset(50% 0 30% 0); }
            80% { transform: translate(-2px,2px); clip-path: inset(20% 0 60% 0); }
            100% { transform: translate(0,0); clip-path: inset(0 0 0 0); }
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            color: #00e0c6;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1 id="titulo" class="glitch" data-text=""></h1>

    <footer>Created by Marcos and Bruno Varela</footer>

    <script>
        const texto = "CodeInMind>";
        let i = 0;

        function escribir() {
            if (i < texto.length) {
                const titulo = document.getElementById("titulo");
                titulo.textContent += texto.charAt(i);
                titulo.setAttribute("data-text", titulo.textContent);
                i++;
                setTimeout(escribir, 150);
            }
        }

        escribir();
    </script>

</body>
</html>
