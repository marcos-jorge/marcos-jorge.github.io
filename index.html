<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeInMind</title>

    <style>
        body {
            background: #0d0d0d;
            color: #00e0c6;
            font-family: "Inter", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 4px;
            white-space: nowrap;
            border-right: 3px solid #00e0c6;
            padding-right: 10px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0% { border-color: transparent; }
            50% { border-color: #00e0c6; }
            100% { border-color: transparent; }
        }
    </style>
</head>
<body>

    <h1 id="titulo"></h1>

    <script>
        const texto = "CodeInMind>";
        let i = 0;

        function escribir() {
            if (i < texto.length) {
                document.getElementById("titulo").textContent += texto.charAt(i);
                i++;
                setTimeout(escribir, 150); // velocidad de escritura
            }
        }

        escribir();
    </script>

</body>
</html>
