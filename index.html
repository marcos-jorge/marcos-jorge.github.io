<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeInMind</title>

    <style>
        body {
            background: #020202;
            color: #00ff66;
            font-family: "Fira Code", monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            cursor: none; /* Ocultamos el cursor normal */
        }

        /* MIRA DEL RATÓN */
        #mira {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid #00ff66;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #00ff66;
        }

        #mira::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 20px;
            background: #00ff66;
            transform: translate(-50%, -50%);
        }

        #mira::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 2px;
            background: #00ff66;
            transform: translate(-50%, -50%);
        }

        h1 {
            font-size: 3.5rem;
            text-shadow: 0 0 10px #00ff66;
            white-space: nowrap;
            z-index: 2;
        }

        .cursor {
            display: inline-block;
            width: 14px;
            height: 2.2rem;
            background: #00ff66;
            margin-left: 6px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 1rem;
            color: #00ff66;
            opacity: 0.7;
            z-index: 2;
        }

        /* Palabras flotantes MÁS GRANDES */
        .floating-word {
            position: absolute;
            color: #00ff66;
            font-size: 2rem;
            opacity: 0.35;
            text-shadow: 0 0 12px #00ff66;
            pointer-events: auto;
            animation: float 12s linear infinite;
            font-weight: bold;
            user-select: none;
        }

        @keyframes float {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(40vw,-20vh) rotate(90deg); }
            50% { transform: translate(-20vw,30vh) rotate(180deg); }
            75% { transform: translate(30vw,10vh) rotate(270deg); }
            100% { transform: translate(0,0) rotate(360deg); }
        }

        /* EFECTO DE IMPACTO */
        .hit {
            animation: hitEffect 0.3s forwards;
        }

        @keyframes hitEffect {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(2); }
        }
    </style>
</head>
<body>

    <!-- MIRA -->
    <div id="mira"></div>

    <!-- Palabras flotantes -->
    <span class="floating-word" style="top:10%; left:5%; animation-duration:14s;">GENEXUS</span>
    <span class="floating-word" style="top:70%; left:15%; animation-duration:18s;">HTML</span>
    <span class="floating-word" style="top:20%; right:10%; animation-duration:16s;">
