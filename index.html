<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeInMind</title>

    <style>
        body {
            background: #020202;
            color: #00ff66;
            font-family: "Fira Code", monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 0 0 10px #00ff66;
            white-space: nowrap;
        }

        .cursor {
            display: inline-block;
            width: 12px;
            height: 2rem;
            background: #00ff66;
            margin-left: 4px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #00ff66;
            opacity: 0.7;
        }

        /* Palabras flotantes */
        .floating-word {
            position: absolute;
            color: #00ff66;
            font-size: 1.2rem;
            opacity: 0.35;
            text-shadow: 0 0 8px #00ff66;
            pointer-events: none;
            animation: float 12s linear infinite;
        }

        @keyframes float {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(40vw,-20vh) rotate(90deg); }
            50% { transform: translate(-20vw,30vh) rotate(180deg); }
            75% { transform: translate(30vw,10vh) rotate(270deg); }
            100% { transform: translate(0,0) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Palabras flotantes -->
    <span class="floating-word" style="top:10%; left:5%; animation-duration:14s;">genexus</span>
    <span class="floating-word" style="top:70%; left:15%; animation-duration:18s;">html</span>
    <span class="floating-word" style="top:20%; right:10%; animation-duration:16s;">css</span>
    <span class="floating-word" style="bottom:15%; left:60%; animation-duration:20s;">javascript</span>
    <span class="floating-word" style="top:50%; right:25%; animation-duration:22s;">python</span>

    <footer>Created by Marcos and Bruno Varela</footer>
