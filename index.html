<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeInMind</title>

    <style>
        body {
            background: #020202;
            color: #00ff66;
            font-family: "Fira Code", "Courier New", monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .screen {
            width: 90%;
            max-width: 900px;
            height: 70vh;
            background: #000;
            border: 2px solid #00ff66;
            padding: 16px;
            box-shadow: 0 0 20px #00ff66;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 2;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        .scanline::after {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                rgba(255,255,255,0.04) 0px,
                rgba(255,255,255,0.04) 1px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            mix-blend-mode: soft-light;
        }

        .glow {
            text-shadow: 0 0 5px #00ff66, 0 0 10px #00ff66;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background: #00ff66;
            margin-left: 2px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        footer {
            margin-top: 16px;
            font-size: 0.9rem;
            color: #00ff66;
            opacity: 0.7;
            z-index: 2;
        }

        /* Palabras flotantes */
        .floating-word {
            position: absolute;
            color: #00ff66;
            font-size: 1.1rem;
            opacity: 0.35;
            text-shadow: 0 0 8px #00ff66;
            pointer-events: none;
            z-index: 1;
            animation: float 12s linear infinite;
        }

        @keyframes float {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(40vw,-20vh) rotate(90deg); }
            50% { transform: translate(-20vw,30vh) rotate(180deg); }
            75% { transform: translate(30vw,10vh) rotate(270deg); }
            100% { transform: translate(0,0) rotate(360deg); }
        }
    </style>
</head>

        function playKeySound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = "square";
                osc.frequency.value = 900 + Math.random() * 300;
                gain.gain.value = 0.03;
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                setTimeout(() => osc.stop(), 25);
            } catch (e) {}
        }

        function typeText(text, speed = 30) {
            return new Promise(resolve => {
                let i = 0;
                function step() {
                    if (i < text.length) {
                        consoleEl.textContent += text.charAt(i);
                        if (text.charAt(i) !== " " && text.charAt(i) !== "\n") playKeySound();
                        i++;
                        consoleEl.scrollTop = consoleEl.scrollHeight;
                        setTimeout(step, speed);
                    } else resolve();
                }
                step();
            });
        }
