<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeInMind</title>

    <style>
        body {
            background: #020202;
            color: #00ff66;
            font-family: "Fira Code", "Courier New", monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .screen {
            width: 90%;
            max-width: 900px;
            height: 70vh;
            background: #000;
            border: 2px solid #00ff66;
            padding: 16px;
            box-shadow: 0 0 20px #00ff66;
            position: relative;
            overflow: hidden;
        }

        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 0.95rem;
            line-height: 1.3;
        }

        .scanline::after {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                rgba(255,255,255,0.04) 0px,
                rgba(255,255,255,0.04) 1px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            mix-blend-mode: soft-light;
        }

        .glow {
            text-shadow: 0 0 5px #00ff66, 0 0 10px #00ff66;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            background: #00ff66;
            margin-left: 2px;
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        footer {
            margin-top: 16px;
            font-size: 0.9rem;
            color: #00ff66;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="screen scanline">
        <pre id="console" class="glow"></pre>
    </div>

    <footer>Created by Marcos and Bruno Varela</footer>
